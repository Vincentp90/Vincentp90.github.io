<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }} — {{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="stylesheet" href="{{ '/assets/main.css' | relative_url }}">
  {% feed_meta %}
</head>
<body>
  <nav class="nav">
    <div class="nav-container">
      <a href="/" class="nav-brand">{{ site.author.name }}</a>
      <div class="nav-links">
        <a href="{{ '/resume/' | relative_url }}">Resume</a>
        <a href="{{ '/blog/' | relative_url }}">Blog</a>
        <a href="{{ site.author.github }}" target="_blank" rel="noopener">GitHub</a>
      </div>
    </div>
  </nav>

  <main class="main">
    {{ content }}
  </main>

  <footer class="footer">
    <p>&copy; {{ "now" | date: "%Y" }} {{ site.author.name }}. Built with Jekyll on GitHub Pages.</p>
  </footer>
</body>
</html>
